<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wonke Connect — Operator Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="/static/components/Shell.jsx"></script>
<script type="text/babel" src="/static/components/Dashboard.jsx"></script>
<script type="text/babel" src="/static/components/Screens.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAKS = {
  "theme": "dark",
  "accent": "orange",
  "density": "cozy",
  "sidebar": "rail"
};

const ACCENTS = {
  orange: { brand: "#ff6a1a", brandInk: "#c44a06", brandSoft: "#fff1e4" },
  teal:   { brand: "#0f8f8a", brandInk: "#0a6b67", brandSoft: "#d9efed" },
  indigo: { brand: "#4f46e5", brandInk: "#3730a3", brandSoft: "#e8e7fb" },
  slate:  { brand: "#1a1714", brandInk: "#000000", brandSoft: "#ece8df" },
};

const applyTweaks = (t) => {
  document.documentElement.setAttribute("data-theme", t.theme);
  document.documentElement.setAttribute("data-density", t.density);
  document.documentElement.setAttribute("data-sidebar", t.sidebar === "rail" ? "rail" : "full");
  const a = ACCENTS[t.accent] || ACCENTS.orange;
  document.documentElement.style.setProperty("--brand", a.brand);
  document.documentElement.style.setProperty("--brand-ink", a.brandInk);
  document.documentElement.style.setProperty("--brand-soft", a.brandSoft);
};

const CRUMBS = {
  dashboard: ["Blue Crane Café", "Dashboard"],
  vouchers:  ["Blue Crane Café", "Vouchers"],
  plans:     ["Blue Crane Café", "Plans"],
  sessions:  ["Blue Crane Café", "Live sessions"],
  customers: ["Blue Crane Café", "Customers"],
  payments:  ["Blue Crane Café", "Payments"],
  router:    ["Setup", "Router"],
  billing:   ["Setup", "Billing"],
  api:       ["Setup", "API keys"],
  settings:  ["Setup", "Settings"],
};

const App = () => {
  const [screen, setScreen] = useState(() => localStorage.getItem("wc-screen") || "dashboard");
  const [tweaks, setTweaks] = useState(TWEAKS);

  useEffect(() => { applyTweaks(tweaks); }, [tweaks]);
  useEffect(() => { localStorage.setItem("wc-screen", screen); }, [screen]);
  useEffect(() => { window.__wcSetScreen = setScreen; }, [setScreen]);

  const renderScreen = () => {
    switch (screen) {
      case "dashboard": return <Dashboard/>;
      case "vouchers":  return <Vouchers/>;
      case "plans":     return <Plans/>;
      case "sessions":  return <Sessions/>;
      case "router":
      case "settings":  return <Settings/>;
      case "customers": return <Placeholder title="Customers" desc="Buyers, repeat visitors, and support contact history."/>;
      case "payments":  return <Placeholder title="Payments" desc="Payouts, refunds, and PayFast transaction log."/>;
      case "billing":   return <Placeholder title="Billing" desc="Your Wonke Connect subscription and invoices."/>;
      case "api":       return <Placeholder title="API keys" desc="Personal access tokens and webhook endpoints."/>;
      default: return <Dashboard/>;
    }
  };

  return (
    <div className="app" data-screen-label={screen}>
      <Sidebar active={screen} setActive={setScreen}/>
      <main className="main">
        <Topbar crumb={CRUMBS[screen] || CRUMBS.dashboard}/>
        <div className="page">{renderScreen()}</div>
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
