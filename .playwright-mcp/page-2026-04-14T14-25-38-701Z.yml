                - paragraph [ref=e619]
                - paragraph [ref=e620]: Security lockout
                - paragraph [ref=e621]: An automated 10-minute lockout is built into the system to minimize the risk of brute force attacks by malicious persons or software.
                - paragraph [ref=e622]: Each request that includes a non-positive response (authentication failure or invalid service key) will be recorded. After the 3rd attempt within a 10-minute period, the account number will be locked and no further requests relating to that account number will be permitted for 10 minutes. The system will return a 201 error.
                - paragraph [ref=e623]: After the 10-minute timer has expired, any further requests that include an invalid service key will re-initiate the 10-minute lockout.
                - paragraph [ref=e624]:
                  - text: Only a request that contains valid data will clear the table.
                  - text: After the 10-minute timer has expired, any further requests that include an invalid service key will re-initiate the 10-minute lockout.
