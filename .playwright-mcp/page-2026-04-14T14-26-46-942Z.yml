                - paragraph [ref=e68]: Pay Now eCommerce is a secure online payment service that can be integrated to receive payments. We offer 3D secure Credit Card payments via Mastercard, Visa, American Express, and Diners Club, Instant EFT, Bank EFT and Retail payments. Our Scan to Pay feature allows multiple wallets and banking applications to scan a single QR code for payment.
