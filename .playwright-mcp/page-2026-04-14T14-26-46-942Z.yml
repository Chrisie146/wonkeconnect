              - generic [ref=e140]:
                - heading "Pay Now service key" [level=4] [ref=e141]: Pay Now service key
                - paragraph [ref=e142]:
                  - text: The
                  - link "service key" [ref=e143] [cursor=pointer]:
                    - /url: https://api.netcash.co.za/glossary#s
                  - text: is used to authenticate access to the Pay Now service. It identifies the origin of the payment instruction. The service key determines the Netcash account to which the proceeds of the payment will be credited and what
                  - link "payment options" [ref=e144] [cursor=pointer]:
                    - /url: "#PnCfig"
                  - text: are available to the customer.
              - generic [ref=e146]:
                - heading "NetConnector" [level=4] [ref=e147]: NetConnector
                - paragraph [ref=e148]:
                  - text: The
                  - link "NetConnector" [ref=e149] [cursor=pointer]:
                    - /url: https://api.netcash.co.za/standard-integration/netconnector-setup/
                  - text: "profile settings allow customisation according to specific requirements:"
                - list [ref=e150]:
                  - listitem [ref=e151]:
                    - strong [ref=e152]: Active
                    - text: ": Indicates the service setting."
                  - listitem [ref=e153]:
                    - strong [ref=e154]: Email
                    - text: ": This is the email address to which any errors in processing will be directed and also to which the service key will be sent. Notifications of transactions will also be received here."
                  - listitem [ref=e155]:
                    - strong [ref=e156]: Service Key
                    - text: ": This is the unique service key (field"
                    - strong [ref=e157]: m1
                    - text: ) which must be included in the POST to the Netcash URL.
                  - listitem [ref=e158]:
                    - strong [ref=e159]: Allow Master and Visa payments
                    - text: ": This option is used to control whether your client may pay by credit card."
                  - listitem [ref=e160]:
                    - strong [ref=e161]: Accept url
                    - text: ": Enter your accept URL here. If the URL changes for any reason, it can be updated on this page. This is the URL that the browser is sent to if the transaction is successful."
                  - listitem [ref=e162]:
                    - strong [ref=e163]: Decline url
                    - text: ": Enter your decline URL here. If the URL changes for any reason, it can be updated on this page. This is the URL that the browser is sent to if the transaction is declined."
                  - listitem [ref=e164]:
                    - strong [ref=e165]: "Notify url:"
                    - text: This is the URL that Netcash will call for all transactions to indicate payment status. It is also used for offline transactions such as Bank EFT and Retail payments where the payment is not processed in real time. These payments will be posted when they are made and Netcash will notify your system through this URL.
                  - listitem [ref=e166]:
                    - strong [ref=e167]: "Redirect url:"
                    - text: This is the URL that the browser is sent to once the complete button is clicked on the Bank EFT and Retail payment screens on Netcash. This could/would return the customer to your site while you are waiting for a payment to be made.
                  - listitem [ref=e168]:
                    - strong [ref=e169]: Make test mode active
                    - text: ": use this setting while you are testing the system to simulate transactions. Once your development is complete, this box should be un-ticked"
