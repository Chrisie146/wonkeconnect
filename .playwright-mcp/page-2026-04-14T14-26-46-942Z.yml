                  - text: "perform two (2) functions namely:"
                - list [ref=e254]:
                  - listitem [ref=e255]:
                    - text: They
                    - strong [ref=e256]: send data
                    - text: back to the host system about the transaction, especially useful for real-time notifications/allocation of credits.
                    - list [ref=e257]:
                      - listitem [ref=e258]:
                        - text: "Once the transaction is processed, the status and the transactional data of the payment gets redirected to two pages:"
                        - list [ref=e259]:
                          - listitem [ref=e260]: The Notify URL always receives all the transaction data but it is not client-facing -and
                          - listitem [ref=e261]: The Accept -or Decline URL depending on the transaction result
                  - listitem [ref=e262]:
                    - text: The Accept -or Decline URL
                    - strong [ref=e263]: redirects
                    - text: the person making the payment, to a
                    - strong [ref=e264]: visual display
                    - text: of the transaction status once the transaction is completed.
                - paragraph [ref=e265]: You will note a Redirect URL in the list as well. This URL is used for when the user click’s the CANCEL PAYMENT button on the payment page, or when the user selects a non-real-time payment; to remind the user of i.e. the payment reference to use.
