# Nixpacks configuration to ensure all necessary files are included in deployment

[start]
runImage = "python:3.12"
startCmd = ["sh", "-c", "python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"]

[files]
# Explicitly ensure schema.sql is included in deployed image
assets = [
  "schema.sql",
  "*.py",
  "*.html",
  "*.css",
  "*.js",
  "static/",
  "1voucher_marketing/"
]
